[menu __calibrate zoffset]
name: {{ gettext('Probe Calibrate') }}
icon: z-farther
panel: zcalibrate

[menu __calibrate offset_manage]
name: {{ gettext('Offset Manage') }}
icon: camera-offset
panel: offset_manage
enable: {{ 'ktamv' in printer.config_sections and 'dual_zcalibrate' in printer.config_sections}}

[menu __calibrate align_datum]
name: {{ gettext('Align datum') }}
icon: z-calibrate
panel: align_datum
enable: {{ 'ktamv' in printer.config_sections and printer.extruders.count > 1}}

[menu __calibrate input_shaper]
name: {{ gettext('Input Shaper') }}
icon: move
panel: input_shaper
enable: {{ 'input_shaper' in printer.config_sections }}
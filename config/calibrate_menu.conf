#
# DO NOT EDIT THIS FILE USE KlipperScreen.conf
#

[menu __calibrate zoffset]
name: {{ gettext('Probe Calibrate') }}
icon: z-farther
panel: zcalibrate

[menu __calibrate xy_calibrate]
name: {{ gettext('XY Calibrate') }}
icon: camera-offset
panel: xy_calibrate
enable: {{ 'ktamv' in printer.config_sections and printer.extruders.count > 1}}

[menu __calibrate dual_zcalibrate]
name: {{ gettext('Z Calibrate') }}
icon: z-offset
panel: dual_zcalibrate
enable: {{ 'dual_zcalibrate' in printer.config_sections and printer.extruders.count > 1}}

[menu __calibrate align_datum]
name: {{ gettext('Align datum') }}
icon: z-calibrate
panel: align_datum
enable: {{ 'ktamv' in printer.config_sections and printer.extruders.count > 1}}

[menu __calibrate eddy_calibrate]
name: {{ gettext('Eddy Calibrate') }}
icon: eddy
panel: eddy_calibrate
enable: {{ printer.eddy.count > 0}}

[menu __calibrate input_shaper]
name: {{ gettext('Input Shaper') }}
icon: move
panel: input_shaper
enable: {{ 'input_shaper' in printer.config_sections }}